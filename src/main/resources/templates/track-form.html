<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${track.id != null} ? 'Edit Track' : 'Add New Track'">Track Form</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #27ae60 0%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .form-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        h1 { color: #333; margin-bottom: 30px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        input:focus { outline: none; border-color: #27ae60; }
        .form-actions { display: flex; gap: 10px; margin-top: 30px; }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s;
            text-decoration: none;
            text-align: center;
        }
        .btn-submit { background: #27ae60; color: white; }
        .btn-submit:hover { background: #229954; }
        .btn-cancel { background: #95a5a6; color: white; }
        .btn-cancel:hover { background: #7f8c8d; }
        .required::after { content: " *"; color: #e74c3c; }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <h1 th:text="${track.id != null} ? 'Edit Track' : 'Create New Track'">Track Form</h1>
            
            <form th:action="${track.id != null} ? @{/tracks/{id}(id=${track.id})} : @{/tracks}" method="post">
                <div class="form-group">
                    <label for="name" class="required">Track Name</label>
                    <input type="text" id="name" name="name" th:value="${track.name}" placeholder="e.g. Spa-Francorchamps" required>
                </div>

                <div class="form-group">
                    <label for="country">Country</label>
                    <input type="text" id="country" name="country" th:value="${track.country}" placeholder="e.g. Belgium">
                </div>
                
                <div class="form-group">
                    <label for="numberOfLayouts">Number of Layouts</label>
                    <input type="number" id="numberOfLayouts" name="numberOfLayouts" th:value="${track.numberOfLayouts}" min="1" placeholder="1">
                </div>

                <div class="form-group">
                    <label for="image">Image URL</label>
                    <input type="text" id="image" name="image" th:value="${track.image}" placeholder="https://example.com/track.png">
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-submit" th:text="${track.id != null} ? 'Update Track' : 'Create Track'">Submit</button>
                    <a href="/tracks" class="btn btn-cancel">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
