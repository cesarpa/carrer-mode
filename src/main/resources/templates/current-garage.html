<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${garage.name + ' - Garage'}">Current Garage</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { color: #fff; }
        .nav-menu { display: flex; gap: 20px; flex-wrap: wrap; }
        .nav-menu a { padding: 10px 20px; background: #e94560; color: white; text-decoration: none; border-radius: 5px; transition: 0.3s; }
        .nav-menu a:hover { background: #0f3460; }

        .content { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 10px; color: #333; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); }
        .garage-info-bar { background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 30px; display: flex; justify-content: space-around; border-left: 5px solid #FF8700; }
        .info-item { text-align: center; }
        .info-label { font-size: 12px; color: #888; text-transform: uppercase; font-weight: 600; }
        .info-value { font-size: 20px; font-weight: 700; color: #333; }
        .credits-value { color: #27ae60; }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #eee; }
        .btn-add-car { background: #27ae60; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; font-weight: 600; transition: 0.3s; border: none; cursor: pointer; text-align: center; }

        /* CHAMPIONSHIP STYLES */
        .championship-list { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .championship-item { background: #f8f9fa; border: 1px solid #e94560; border-radius: 8px; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .championship-info h4 { color: #e94560; margin-bottom: 5px; }
        .championship-info p { font-size: 13px; color: #666; }
        .join-form { background: #f0f2f5; padding: 20px; border-radius: 8px; display: flex; gap: 10px; align-items: flex-end; margin-top: 20px; border: 1px solid #ddd; }
        .join-form .form-group { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .join-form label { font-size: 12px; font-weight: 700; color: #555; text-transform: uppercase; }
        .join-form select { padding: 10px; border-radius: 5px; border: 1px solid #ccc; width: 100%; }
        .btn-join { background: #e94560; color: white; padding: 10px 20px; border: none; border-radius: 5px; font-weight: 600; cursor: pointer; height: 40px; }

        .cars-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .car-card { background: white; border: 1px solid #ddd; border-radius: 10px; overflow: hidden; transition: 0.3s; display: flex; flex-direction: column; }
        .car-img { width: 100%; height: 160px; object-fit: cover; background: #eee; }
        .car-details { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .car-name { font-size: 18px; font-weight: 700; margin-bottom: 5px; }

        .race-controls {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #ddd;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .race-input-group {
            display: flex;
            gap: 5px;
        }
        .input-pos {
            flex: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
        }
        .btn-race {
            background: #FF8700;
            color: #000;
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn-race:hover { background: #e67a00; }

        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        .fee-tag {
            background: #eee;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            color: #666;
            display: inline-block;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="header-top">
            <h1 th:text="${garage.name}">Garage Name</h1>
            <a href="/garages" style="color: white; text-decoration: none; font-weight: 600;">← Back to Garages</a>
        </div>
        <nav class="nav-menu">
            <a href="/">Home</a>
            <a href="/cars">Cars</a>
            <a href="/garages">Garages</a>
            <a href="/championships">Championships</a>
        </nav>
    </header>

    <div class="content">
        <!-- Result Messages -->
        <div th:if="${raceResult}" class="alert alert-success" th:text="${raceResult}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div class="garage-info-bar">
            <div class="info-item">
                <p class="info-label">Available Credits</p>
                <p class="info-value credits-value" id="garageBalance"
                   th:text="${garage.credits != null ? '$' + #numbers.formatDecimal(garage.credits, 0, 'COMMA', 0, 'POINT') : '$0'}">$0</p>
            </div>
            <div class="info-item">
                <p class="info-label">Fleet Size</p>
                <p class="info-value" th:text="${garage.cars != null ? garage.cars.size() : 0}">0</p>
            </div>
        </div>

        <div class="section-header">
            <h2>Vehicle Collection</h2>
            <a th:href="@{/garage-cars/assign(garageId=${garage.id})}" class="btn-add-car" style="background: #3498db;">+ Buy Car</a>
        </div>

        <div th:unless="${garage.cars == null || garage.cars.isEmpty()}" class="cars-grid">
            <div th:each="car : ${garage.cars}" class="car-card">
                <img th:src="${car.image != null && !car.image.isEmpty() ? car.image : 'https://via.placeholder.com/300x160?text=No+Image'}"
                     class="car-img" th:alt="${car.name}">
                <div class="car-details">
                    <div class="car-name" th:text="${car.name}">Car Name</div>
                    <div style="font-size: 13px; color: #666; margin-bottom: 5px;">
                        Value: <span th:text="${car.price != null ? '$' + #numbers.formatDecimal(car.price, 0, 'COMMA', 0, 'POINT') : '$0'}">$0</span>
                    </div>
                    <div style="font-size: 13px; color: #666; margin-bottom: 10px;">
                        HP: <span th:text="${car.horsePower != null ? car.horsePower + ' HP' : 'N/A'}">N/A</span>
                    </div>

                    <form th:action="@{/garage-cars/sell}" method="post" style="width: 100%; margin-top: 10px;">
                        <input type="hidden" name="garageId" th:value="${garage.id}">
                        <input type="hidden" name="carId" th:value="${car.id}">
                        <button type="submit"
                                class="btn-add-car"
                                style="background: #e74c3c; width: 100%;">
                            Sell Vehicle
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="content" style="margin-top: 30px; padding: 0;">
            <div class="section-header">
                <h2>Championship Participation</h2>
            </div>

            <!-- Join New Championship Form -->
            <form th:action="@{/garages/{id}/join-championship(id=${garage.id})}" method="post" class="join-form">
                <div class="form-group">
                    <label for="championshipId">Available Championships</label>
                    <select name="championshipId" id="championshipId" required>
                        <option value="">-- Select a Tournament --</option>
                        <option th:each="champ : ${allChampionships}"
                                th:value="${champ.id}"
                                th:text="${champ.name + ' (Fee: $' + #numbers.formatDecimal(champ.entryFee, 0, 'COMMA', 0, 'POINT') + ') [' + #strings.listJoin(champ.championshipCategories.![category.name], ', ') + ']'}">
                        </option>
                    </select>
                </div>
                <button type="submit" class="btn-join">Pay Fee & Join</button>
            </form>

            <!-- List of joined championships -->
            <div class="championship-list">
                <div th:if="${garage.garageChampionships.isEmpty()}" style="text-align: center; color: #999; padding: 20px;">
                    This garage hasn't joined any championships yet.
                </div>
                <div th:each="gc : ${garage.garageChampionships}" class="championship-item">
                    <div class="championship-info">
                        <h4 th:text="${gc.championship.name}">Championship Name</h4>
                        <div style="margin-bottom: 8px;">
                            <span th:each="cc : ${gc.championship.championshipCategories}" 
                                  class="fee-tag" 
                                  style="background: #0f3460; color: white; margin-right: 5px;"
                                  th:text="${cc.category.name}">Category</span>
                        </div>
                        <p th:text="${gc.championship.description}">Description</p>
                        <span class="fee-tag" th:text="${gc.championship.numberOfTracks + ' Tracks'}">5 Tracks</span>
                    </div>
                    
                    <form th:action="@{/garages/{id}/complete-championship(id=${garage.id})}" method="post" 
                          style="display: flex; align-items: flex-end; gap: 10px;">
                        <input type="hidden" name="championshipId" th:value="${gc.championship.id}">
                        <div style="display: flex; flex-direction: column; gap: 5px;">
                            <label style="font-size: 10px; font-weight: bold; color: #666; text-transform: uppercase;">Final Position</label>
                            <input type="number" name="position" value="1" min="1" max="20" required
                                   style="width: 60px; padding: 8px; border-radius: 5px; border: 1px solid #ccc;">
                        </div>
                        <button type="submit" class="btn-race" style="width: auto; padding: 10px 15px; background: #e94560; color: white;">
                            🏆 Finish
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
