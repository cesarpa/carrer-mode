<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pilot.id != null} ? 'Edit Pilot' : 'Register Pilot'">Pilot Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .form-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            color: #333;
        }
        
        h1 {
            color: #1a1a2e;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            transition: 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #e94560;
            box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.1);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            text-align: center;
        }
        
        .btn-submit {
            background: #e94560;
            color: white;
        }
        
        .btn-submit:hover {
            background: #0f3460;
        }
        
        .btn-cancel {
            background: #eee;
            color: #666;
        }
        
        .btn-cancel:hover {
            background: #ddd;
        }

        .required::after {
            content: " *";
            color: #e94560;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <h1 th:text="${pilot.id != null} ? 'Edit Pilot Profile' : 'Register New Pilot'">Pilot Form</h1>
            
            <form th:action="@{/pilots}" th:object="${pilot}" method="post">
                <input type="hidden" th:field="*{id}">
                
                <div class="form-group">
                    <label for="name" class="required">Full Name</label>
                    <input type="text" id="name" th:field="*{name}" placeholder="e.g. Cesar Palacios" required>
                </div>

                <div class="form-group">
                    <label for="image">Image URL</label>
                    <input type="text" id="image" th:field="*{image}" placeholder="https://example.com/pilot-image.jpg">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="country">Nationality</label>
                        <input type="text" id="country" th:field="*{country}" placeholder="e.g. Colombia">
                    </div>
                    
                    <div class="form-group">
                        <label for="experience">Experience</label>
                        <input type="number" id="experience" th:field="*{experience}" min="0">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="licence">License Type</label>
                        <select id="licence" th:field="*{licence}">
                            <option value="Standard">Standard</option>
                            <option value="Class B">Class B (Pro)</option>
                            <option value="Class A">Class A (Elite)</option>
                            <option value="Super License">Super License (F1)</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="garage">Assigned Garage</label>
                        <select id="garage" th:field="*{garage.id}">
                            <option value="">-- No Garage --</option>
                            <option th:each="grg : ${garages}" 
                                    th:value="${grg.id}" 
                                    th:text="${grg.name}">
                            </option>
                        </select>
                    </div>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-submit" th:text="${pilot.id != null} ? 'Update Profile' : 'Register Pilot'">Submit</button>
                    <a href="/pilots" class="btn btn-cancel">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
